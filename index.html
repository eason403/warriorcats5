<!DOCTYPE html>
<html>
<head>
<title>Warrior Cats 3D</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#start {
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
font-family:Arial;
}
</style>
</head>
<body>

<div id="start">
<h2>Warrior Cats 3D</h2>
Click Start → then click screen to move
<br><br>
<button onclick="startGame()">Start</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene, camera, renderer, controls;
let moveForward=false;
let moveBackward=false;
let moveLeft=false;
let moveRight=false;

function startGame(){

document.getElementById("start").style.display="none";

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);


// LIGHT
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,7);
scene.add(light);


// GROUND
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshLambertMaterial({color:0x228B22})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);


// LAKE
const lake = new THREE.Mesh(
new THREE.CircleGeometry(20,32),
new THREE.MeshLambertMaterial({color:0x4aa3ff})
);
lake.rotation.x = -Math.PI/2;
lake.position.y = 0.01;
scene.add(lake);


// TREES
for(let i=0;i<40;i++){

const trunk = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,4),
new THREE.MeshLambertMaterial({color:0x8B4513})
);

trunk.position.set(
Math.random()*100-50,
2,
Math.random()*100-50
);

scene.add(trunk);


const leaves = new THREE.Mesh(
new THREE.SphereGeometry(2),
new THREE.MeshLambertMaterial({color:0x006400})
);

leaves.position.set(
trunk.position.x,
5,
trunk.position.z
);

scene.add(leaves);

}


// PLAYER CAT (cube placeholder)
const cat = new THREE.Mesh(
new THREE.BoxGeometry(2,1,3),
new THREE.MeshLambertMaterial({color:0xffaa00})
);

cat.position.y = 0.5;
scene.add(cat);


// CONTROLS
controls = new THREE.PointerLockControls(camera, document.body);

document.body.addEventListener("click",()=>{
controls.lock();
});

scene.add(controls.getObject());

camera.position.set(0,2,10);


// MOVEMENT KEYS
document.addEventListener("keydown",(e)=>{
if(e.code==="KeyW") moveForward=true;
if(e.code==="KeyS") moveBackward=true;
if(e.code==="KeyA") moveLeft=true;
if(e.code==="KeyD") moveRight=true;
});

document.addEventListener("keyup",(e)=>{
if(e.code==="KeyW") moveForward=false;
if(e.code==="KeyS") moveBackward=false;
if(e.code==="KeyA") moveLeft=false;
if(e.code==="KeyD") moveRight=false;
});


// LOOP
function animate(){

requestAnimationFrame(animate);

if(moveForward) controls.moveForward(0.2);
if(moveBackward) controls.moveForward(-0.2);
if(moveLeft) controls.moveRight(-0.2);
if(moveRight) controls.moveRight(0.2);

renderer.render(scene,camera);

}

animate();

}

</script>
